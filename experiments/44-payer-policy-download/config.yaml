# Output configuration
output:
  base_dir: "data"
  manifest_file: "data/manifest.json"
  rules_file: "rules/payer_rules.json"

# Download settings
settings:
  user_agent: "MarginLogic-PolicyDownloader/1.0 (Research; Texas Retina Associates)"
  request_delay_seconds: 2
  max_retries: 3
  timeout_seconds: 30
  verify_ssl: true
