      - "ophthalmology"

  bcbstx:
    name: "Blue Cross Blue Shield of Texas"
    type: "Commercial + Medicare Advantage"
    sources:
      - type: "medical_policy"
        url: "https://www.bcbstx.com/provider/clinical/medical-policies"
        description: "Medical Policies — Ophthalmology"
      - type: "prior_auth"
        url: "https://www.bcbstx.com/provider/prior-authorization"
        description: "Prior Authorization Requirements"
      - type: "availity"
        url: "https://www.availity.com"
        description: "Availity Portal (PA submission for BCBS)"
    search_keywords:
      - "intravitreal injection"
      - "anti-VEGF"
      - "67028"
      - "ophthalmology"

  humana:
    name: "Humana Medicare Advantage"
    type: "Medicare Advantage"
    sources:
      - type: "medical_coverage"
        url: "https://www.humana.com/provider/medical-resources/clinical"
        description: "Medical Coverage Policies"
